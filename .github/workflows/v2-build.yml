name: GameSave Manager V2 构建

on:
  pull_request:
    paths:
      - 'GameSaveManager.V2.sln'
      - 'src/GameSaveManager.App/**'
      - 'src/GameSaveManager.Application/**'
      - 'src/GameSaveManager.Domain/**'
      - 'src/GameSaveManager.Infrastructure/**'
      - '.github/workflows/v2-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows .NET 10 构建
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 还原依赖
        run: dotnet restore .\GameSaveManager.V2.sln

      - name: 编译 V2
        run: dotnet build .\GameSaveManager.V2.sln -c Debug --no-restore
