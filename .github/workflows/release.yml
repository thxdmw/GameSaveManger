name: GameSave Manager 安全预发布

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 已存在且尚未发布的版本标签，例如 v0.2.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: gamesave-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: 签名、验证并发布 Windows 安装包
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: 检出版本标签
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: 配置 .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 校验版本、标签和发布说明
        id: version
        shell: pwsh
        run: .\scripts\test-release-version.ps1 -Tag $env:RELEASE_TAG

      - name: 导入自签发布证书和更新清单私钥
        id: signing
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
          MANIFEST_PRIVATE_KEY_BASE64: ${{ secrets.UPDATE_MANIFEST_SIGNING_KEY_BASE64 }}
        run: |
          foreach ($name in @('SIGNING_PFX_BASE64', 'SIGNING_PFX_PASSWORD', 'MANIFEST_PRIVATE_KEY_BASE64')) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              throw "缺少安全发布密钥：$name"
            }
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP 'gamesavemanager-signing.pfx'
          $manifestKeyPath = Join-Path $env:RUNNER_TEMP 'update-manifest-private-key.pk8'
          $publicCertificatePath = '.\certificates\GameSaveManager-Publisher.cer'
          $certificateMetadata = Get-Content '.\certificates\GameSaveManager-Publisher.json' -Raw | ConvertFrom-Json
          "pfx_path=$pfxPath" | Add-Content $env:GITHUB_OUTPUT -Encoding utf8
          "manifest_key_path=$manifestKeyPath" | Add-Content $env:GITHUB_OUTPUT -Encoding utf8
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
          [IO.File]::WriteAllBytes($manifestKeyPath, [Convert]::FromBase64String($env:MANIFEST_PRIVATE_KEY_BASE64))
          $password = ConvertTo-SecureString $env:SIGNING_PFX_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $certificate.HasPrivateKey) { throw '代码签名证书不包含私钥。' }
          "certificate_thumbprint=$($certificate.Thumbprint)" | Add-Content $env:GITHUB_OUTPUT -Encoding utf8

          $publicCertificate = [Security.Cryptography.X509Certificates.X509Certificate2]::new($publicCertificatePath)
          try {
            $publisherSha256 = $certificate.GetCertHashString(
              [Security.Cryptography.HashAlgorithmName]::SHA256).ToLowerInvariant()
            $publicSha256 = $publicCertificate.GetCertHashString(
              [Security.Cryptography.HashAlgorithmName]::SHA256).ToLowerInvariant()
            if ($publisherSha256 -ne $publicSha256 -or
                $publisherSha256 -ne $certificateMetadata.publisherCertificateSha256) {
              throw 'PFX、公开证书与仓库证书元数据不一致。'
            }
            $ekuSource = $certificate.Extensions | Where-Object { $_.Oid.Value -eq '2.5.29.37' } | Select-Object -First 1
            if ($null -eq $ekuSource) { throw '代码签名证书缺少增强用途。' }
            $eku = [Security.Cryptography.X509Certificates.X509EnhancedKeyUsageExtension]::new(
              $ekuSource,
              $ekuSource.Critical)
            if (-not ($eku.EnhancedKeyUsages.Value -contains '1.3.6.1.5.5.7.3.3')) {
              throw '证书不允许用于代码签名。'
            }
          }
          finally {
            $publicCertificate.Dispose()
          }

          # 托管 Runner 不应把自签叶证书提升为根 CA；TrustedPeople 足以让 SignTool
          # 在本次临时会话中直接信任固定的发布者叶证书，也不会触发根证书确认。
          Import-Certificate -FilePath $publicCertificatePath -CertStoreLocation Cert:\CurrentUser\TrustedPeople | Out-Null
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $signTool) { throw '未找到 Windows SDK SignTool。' }

          "publisher_certificate_sha256=$publisherSha256" | Add-Content $env:GITHUB_OUTPUT -Encoding utf8
          "sign_tool=$($signTool.FullName)" | Add-Content $env:GITHUB_OUTPUT -Encoding utf8

      - name: 还原、构建和验证
        shell: pwsh
        run: |
          dotnet restore .\GameSaveManager.sln
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet build .\GameSaveManager.sln -c Release --no-restore
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test .\GameSaveManager.sln -c Release --no-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet run --project .\tests\GameSaveManager.Verification\GameSaveManager.Verification.csproj -c Release --no-build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 安装 Inno Setup 6
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: 生成并验证 Authenticode 安装包
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 `
            -SignToolPath '${{ steps.signing.outputs.sign_tool }}' `
            -SigningCertificateThumbprint '${{ steps.signing.outputs.certificate_thumbprint }}'

      - name: 生成签名更新清单和完整校验和
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $installer = ".\artifacts\installer\GameSaveManager-Setup-$version.exe"
          $manifest = '.\artifacts\installer\update-manifest.json'
          $signature = '.\artifacts\installer\update-manifest.json.sig'
          $releasePage = "https://github.com/thxdmw/GameSaveManger/releases/tag/$env:RELEASE_TAG"
          $installerUrl = "https://github.com/thxdmw/GameSaveManger/releases/download/$env:RELEASE_TAG/GameSaveManager-Setup-$version.exe"
          dotnet run --project .\tools\GameSaveManager.ReleaseTool\GameSaveManager.ReleaseTool.csproj -c Release -- `
            create-manifest `
            --installer $installer `
            --output $manifest `
            --signature $signature `
            --private-key '${{ steps.signing.outputs.manifest_key_path }}' `
            --version $version `
            --channel preview `
            --release-page-url $releasePage `
            --installer-url $installerUrl `
            --publisher-certificate-sha256 '${{ steps.signing.outputs.publisher_certificate_sha256 }}'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet run --project .\tools\GameSaveManager.ReleaseTool\GameSaveManager.ReleaseTool.csproj -c Release -- `
            verify `
            --input $manifest `
            --signature $signature `
            --public-key .\src\GameSaveManager.Infrastructure\Updates\Assets\update-signing-public-key.pem
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $checksumTargets = @(
            $installer,
            '.\certificates\GameSaveManager-Publisher.cer',
            '.\certificates\GameSaveManager-Publisher.json',
            '.\scripts\Install-GameSaveManagerCertificate.ps1',
            '.\scripts\Remove-GameSaveManagerCertificate.ps1',
            ".\docs\release-notes-$version.md",
            $manifest,
            $signature
          )
          $checksumLines = foreach ($path in $checksumTargets) {
            $file = Get-Item -LiteralPath $path
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $checksumLines | Set-Content '.\artifacts\installer\SHA256SUMS.txt' -Encoding ascii

      - name: 创建不可变 GitHub 预发布
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $assets = @(
            ".\artifacts\installer\GameSaveManager-Setup-$version.exe",
            '.\artifacts\installer\SHA256SUMS.txt',
            '.\artifacts\installer\update-manifest.json',
            '.\artifacts\installer\update-manifest.json.sig',
            '.\certificates\GameSaveManager-Publisher.cer',
            '.\certificates\GameSaveManager-Publisher.json',
            '.\scripts\Install-GameSaveManagerCertificate.ps1',
            '.\scripts\Remove-GameSaveManagerCertificate.ps1',
            ".\docs\release-notes-$version.md"
          )
          foreach ($path in $assets) {
            if (-not (Test-Path -LiteralPath $path)) { throw "发布文件不存在：$path" }
          }
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "版本 $env:RELEASE_TAG 已经存在；安全发布附件禁止覆盖，请递增版本号。"
          }
          gh release create $env:RELEASE_TAG @assets `
            --verify-tag --prerelease --title "GameSave Manager $version" `
            --notes-file ".\docs\release-notes-$version.md"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 清理发布密钥和临时信任
        if: always()
        shell: pwsh
        run: |
          $thumbprint = '${{ steps.signing.outputs.certificate_thumbprint }}'
          if (-not [string]::IsNullOrWhiteSpace($thumbprint)) {
            foreach ($store in @('My', 'TrustedPeople')) {
              Remove-Item "Cert:\CurrentUser\$store\$thumbprint" -Force -ErrorAction SilentlyContinue
            }
          }
          foreach ($path in @(
            '${{ steps.signing.outputs.pfx_path }}',
            '${{ steps.signing.outputs.manifest_key_path }}')) {
            if (-not [string]::IsNullOrWhiteSpace($path)) {
              Remove-Item -LiteralPath $path -Force -ErrorAction SilentlyContinue
            }
          }
