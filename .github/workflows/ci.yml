name: 客户端验证

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore .\GameSaveManager.sln
      - run: dotnet build .\GameSaveManager.sln -c Debug --no-restore
      - run: dotnet build .\GameSaveManager.sln -c Release --no-restore
      - run: dotnet test .\GameSaveManager.sln -c Release --no-build
      - run: dotnet run --project .\tests\GameSaveManager.Verification\GameSaveManager.Verification.csproj -c Release --no-build
      - run: dotnet publish .\src\GameSaveManager.App\GameSaveManager.App.csproj -c Release -r win-x64 --self-contained false -o .\publish
      - shell: pwsh
        run: |
          if (-not (Test-Path .\publish\Assets\ludusavi-manifest.yaml)) { throw '缺少 Ludusavi Manifest' }
          if (-not (Test-Path .\publish\Assets\NOTICE-Ludusavi-manifest.txt)) { throw '缺少 Ludusavi NOTICE' }
      - uses: actions/upload-artifact@v4
        with:
          name: windows-publish
          path: publish
