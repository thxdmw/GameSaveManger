name: GameSave Manager 构建

on:
  push:
    branches: [master, main]
    paths:
      - 'GameSaveManager.sln'
      - 'ARCHITECTURE.md'
      - 'docs/*.md'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'GameSaveManager.sln'
      - 'ARCHITECTURE.md'
      - 'docs/*.md'
      - 'src/GameSaveManager.App/**'
      - 'src/GameSaveManager.Application/**'
      - 'src/GameSaveManager.Domain/**'
      - 'src/GameSaveManager.Infrastructure/**'
      - 'tests/GameSaveManager.Verification/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows .NET 10 构建
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 还原依赖
        shell: pwsh
        run: |
          dotnet restore .\GameSaveManager.sln *>&1 | Tee-Object -FilePath dotnet-restore.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Debug 编译
        shell: pwsh
        run: |
          dotnet build .\GameSaveManager.sln -c Debug --no-restore *>&1 | Tee-Object -FilePath dotnet-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Release 编译与测试
        shell: pwsh
        run: |
          dotnet build .\GameSaveManager.sln -c Release --no-restore *>&1 | Tee-Object -FilePath dotnet-release.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test .\GameSaveManager.sln -c Release --no-build *>&1 | Tee-Object -FilePath dotnet-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 执行基础边界验证
        shell: pwsh
        run: |
          dotnet run --project .\tests\GameSaveManager.Verification\GameSaveManager.Verification.csproj -c Release --no-build *>&1 | Tee-Object -FilePath dotnet-verification.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 发布并检查第三方资源
        shell: pwsh
        run: |
          dotnet publish .\src\GameSaveManager.App\GameSaveManager.App.csproj -c Release -r win-x64 --self-contained false -o .\publish\framework-dependent *>&1 | Tee-Object -FilePath dotnet-publish.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet publish .\src\GameSaveManager.App\GameSaveManager.App.csproj -c Release -r win-x64 --self-contained true -o .\publish\self-contained-win-x64 *>&1 | Tee-Object -FilePath dotnet-publish-self-contained.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          foreach ($package in @('.\publish\framework-dependent', '.\publish\self-contained-win-x64')) {
            if (-not (Test-Path "$package\Assets\ludusavi-manifest.yaml")) { throw "$package 缺少 Ludusavi Manifest" }
            if (-not (Test-Path "$package\Assets\NOTICE-Ludusavi-manifest.txt")) { throw "$package 缺少 Ludusavi NOTICE" }
            $executable = Resolve-Path "$package\GameSaveManager.exe"
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $executable).Hash.ToLowerInvariant()
            "$hash  GameSaveManager.exe" | Set-Content -Encoding ascii "$package\SHA256SUMS.txt"
          }

      - name: 上传 .NET 构建日志
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gamesave-dotnet-logs
          path: |
            dotnet-restore.log
            dotnet-build.log
            dotnet-release.log
            dotnet-test.log
            dotnet-verification.log
            dotnet-publish.log
            dotnet-publish-self-contained.log
          if-no-files-found: warn
          retention-days: 7

      - name: 上传 Windows 发布包
        uses: actions/upload-artifact@v7
        with:
          name: gamesave-windows-win-x64
          path: publish
          if-no-files-found: error
          retention-days: 14
