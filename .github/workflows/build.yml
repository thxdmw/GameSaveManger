name: GameSave Manager 构建

on:
  push:
    branches: [master, main]
    paths:
      - 'GameSaveManager.sln'
      - 'ARCHITECTURE.md'
      - 'docs/*.md'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'GameSaveManager.sln'
      - 'ARCHITECTURE.md'
      - 'docs/*.md'
      - 'src/GameSaveManager.App/**'
      - 'src/GameSaveManager.Application/**'
      - 'src/GameSaveManager.Domain/**'
      - 'src/GameSaveManager.Infrastructure/**'
      - 'tests/GameSaveManager.Verification/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows .NET 10 构建
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 还原依赖
        shell: pwsh
        run: |
          dotnet restore .\GameSaveManager.sln *>&1 | Tee-Object -FilePath dotnet-restore.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Debug 编译
        shell: pwsh
        run: |
          dotnet build .\GameSaveManager.sln -c Debug --no-restore *>&1 | Tee-Object -FilePath dotnet-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Release 编译与测试
        shell: pwsh
        run: |
          dotnet build .\GameSaveManager.sln -c Release --no-restore *>&1 | Tee-Object -FilePath dotnet-release.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test .\GameSaveManager.sln -c Release --no-build *>&1 | Tee-Object -FilePath dotnet-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 执行基础边界验证
        shell: pwsh
        run: |
          dotnet run --project .\tests\GameSaveManager.Verification\GameSaveManager.Verification.csproj -c Release --no-build *>&1 | Tee-Object -FilePath dotnet-verification.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 发布并检查第三方资源
        shell: pwsh
        run: |
          dotnet publish .\src\GameSaveManager.App\GameSaveManager.App.csproj -c Release -r win-x64 --self-contained false -o .\publish\framework-dependent *>&1 | Tee-Object -FilePath dotnet-publish.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet publish .\src\GameSaveManager.App\GameSaveManager.App.csproj -c Release -r win-x64 --self-contained true -o .\publish\self-contained-win-x64 *>&1 | Tee-Object -FilePath dotnet-publish-self-contained.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          foreach ($package in @('.\publish\framework-dependent', '.\publish\self-contained-win-x64')) {
            if (-not (Test-Path "$package\Assets\ludusavi-manifest.yaml")) { throw "$package 缺少 Ludusavi Manifest" }
            if (-not (Test-Path "$package\Assets\NOTICE-Ludusavi-manifest.txt")) { throw "$package 缺少 Ludusavi NOTICE" }
          }

      - name: 可选 Authenticode 代码签名
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          WINDOWS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERTIFICATE_BASE64)) {
            '未配置签名证书，本次产物未签名。' | Set-Content -Encoding utf8 .\publish\SIGNING-STATUS.txt
            Write-Warning '未配置 WINDOWS_SIGNING_CERTIFICATE_BASE64，跳过 Authenticode 签名。'
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP 'gamesave-signing.pfx'
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERTIFICATE_BASE64))
          try {
            $certificate = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
              $certificatePath,
              $env:WINDOWS_SIGNING_CERTIFICATE_PASSWORD,
              [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet)
            $targets = Get-ChildItem .\publish -Recurse -File | Where-Object {
              $_.Name -eq 'GameSaveManager.exe' -or $_.Name -like 'GameSaveManager*.dll'
            }
            foreach ($target in $targets) {
              $signature = Set-AuthenticodeSignature -LiteralPath $target.FullName -Certificate $certificate `
                -HashAlgorithm SHA256 -TimestampServer 'http://timestamp.digicert.com'
              if ($signature.Status -ne 'Valid') { throw "签名失败：$($target.FullName)，$($signature.StatusMessage)" }
            }
            'Authenticode SHA-256 签名完成。' | Set-Content -Encoding utf8 .\publish\SIGNING-STATUS.txt
          }
          finally {
            Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
          }

      - name: 压缩并校验完整发布包
        shell: pwsh
        run: |
          $commit = '${{ github.sha }}'
          "版本：0.1.0`n提交：$commit`n构建时间（UTC）：$([DateTime]::UtcNow.ToString('O'))" |
            Set-Content -Encoding utf8 .\publish\RELEASE-METADATA.txt
          Copy-Item .\publish\RELEASE-METADATA.txt .\publish\framework-dependent\RELEASE-METADATA.txt
          Copy-Item .\publish\RELEASE-METADATA.txt .\publish\self-contained-win-x64\RELEASE-METADATA.txt
          Copy-Item .\CHANGELOG.md .\publish\framework-dependent\CHANGELOG.md
          Copy-Item .\CHANGELOG.md .\publish\self-contained-win-x64\CHANGELOG.md
          $archives = @(
            @{ Source='.\publish\framework-dependent\*'; Target='.\publish\GameSaveManager-framework-dependent-win-x64.zip' },
            @{ Source='.\publish\self-contained-win-x64\*'; Target='.\publish\GameSaveManager-self-contained-win-x64.zip' }
          )
          foreach ($archive in $archives) {
            Compress-Archive -Path $archive.Source -DestinationPath $archive.Target -CompressionLevel Optimal
          }
          $lines = foreach ($archive in $archives) {
            $file = Get-Item -LiteralPath $archive.Target
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Encoding ascii .\publish\SHA256SUMS.txt

      - name: 上传 .NET 构建日志
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gamesave-dotnet-logs
          path: |
            dotnet-restore.log
            dotnet-build.log
            dotnet-release.log
            dotnet-test.log
            dotnet-verification.log
            dotnet-publish.log
            dotnet-publish-self-contained.log
          if-no-files-found: warn
          retention-days: 7

      - name: 上传 Windows 发布包
        uses: actions/upload-artifact@v7
        with:
          name: gamesave-windows-win-x64
          path: publish
          if-no-files-found: error
          retention-days: 14
