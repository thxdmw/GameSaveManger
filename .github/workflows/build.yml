name: GameSave Manager 构建

on:
  push:
    branches: [master, main]
    paths:
      - 'GameSaveManager.sln'
      - 'Directory.Build.props'
      - 'ARCHITECTURE.md'
      - 'docs/*.md'
      - 'installer/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'tools/**'
      - '.github/workflows/*.yml'
  pull_request:
    paths:
      - 'GameSaveManager.sln'
      - 'Directory.Build.props'
      - 'ARCHITECTURE.md'
      - 'docs/*.md'
      - 'installer/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
      - 'tools/**'
      - '.github/workflows/*.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Windows .NET 10 构建
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 还原依赖
        shell: pwsh
        run: |
          dotnet restore .\GameSaveManager.sln *>&1 | Tee-Object -FilePath dotnet-restore.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Debug 编译
        shell: pwsh
        run: |
          dotnet build .\GameSaveManager.sln -c Debug --no-restore *>&1 | Tee-Object -FilePath dotnet-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Release 编译与测试
        shell: pwsh
        run: |
          dotnet build .\GameSaveManager.sln -c Release --no-restore *>&1 | Tee-Object -FilePath dotnet-release.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet test .\GameSaveManager.sln -c Release --no-build *>&1 | Tee-Object -FilePath dotnet-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 执行基础边界验证
        shell: pwsh
        run: |
          dotnet run --project .\tests\GameSaveManager.Verification\GameSaveManager.Verification.csproj -c Release --no-build *>&1 | Tee-Object -FilePath dotnet-verification.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: 发布并检查第三方资源
        shell: pwsh
        run: |
          .\scripts\publish-windows.ps1 -DeploymentMode FrameworkDependent -OutputDirectory .\publish\framework-dependent *>&1 | Tee-Object -FilePath dotnet-publish.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          .\scripts\publish-windows.ps1 -DeploymentMode SelfContained -OutputDirectory .\publish\self-contained-win-x64 *>&1 | Tee-Object -FilePath dotnet-publish-self-contained.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          foreach ($package in @('.\publish\framework-dependent', '.\publish\self-contained-win-x64')) {
            foreach ($path in @(
              "$package\Assets\ludusavi-manifest.yaml",
              "$package\Assets\NOTICE-Ludusavi-manifest.txt",
              "$package\GameSaveManager.UpdateBootstrapper.exe")) {
              if (-not (Test-Path -LiteralPath $path)) { throw "$package 缺少必要文件：$path" }
            }
          }
          '普通 CI artifact 仅用于构建检查，未签名且不得作为正式更新发布。正式发布只能使用 release.yml。' |
            Set-Content -Encoding utf8 .\publish\SIGNING-STATUS.txt

      - name: 压缩并校验完整发布包
        shell: pwsh
        run: |
          . .\scripts\release-common.ps1
          $releaseInfo = Get-GameSaveManagerReleaseInfo -RepositoryRoot $PWD
          $commit = '${{ github.sha }}'
          "版本：$($releaseInfo.Version)`n发布通道：$($releaseInfo.ReleaseChannel)`n提交：$commit`n构建时间（UTC）：$([DateTime]::UtcNow.ToString('O'))" |
            Set-Content -Encoding utf8 .\publish\RELEASE-METADATA.txt
          foreach ($package in @('.\publish\framework-dependent', '.\publish\self-contained-win-x64')) {
            Copy-Item .\publish\RELEASE-METADATA.txt "$package\RELEASE-METADATA.txt"
            Copy-Item .\publish\SIGNING-STATUS.txt "$package\SIGNING-STATUS.txt"
            Copy-Item .\CHANGELOG.md "$package\CHANGELOG.md"
          }
          $archives = @(
            @{ Source='.\publish\framework-dependent\*'; Target='.\publish\GameSaveManager-framework-dependent-win-x64.zip' },
            @{ Source='.\publish\self-contained-win-x64\*'; Target='.\publish\GameSaveManager-self-contained-win-x64.zip' }
          )
          foreach ($archive in $archives) {
            Compress-Archive -Path $archive.Source -DestinationPath $archive.Target -CompressionLevel Optimal
          }
          $lines = foreach ($archive in $archives) {
            $file = Get-Item -LiteralPath $archive.Target
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $file.FullName).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -Encoding ascii .\publish\SHA256SUMS.txt

      - name: 上传 .NET 构建日志
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gamesave-dotnet-logs
          path: |
            dotnet-restore.log
            dotnet-build.log
            dotnet-release.log
            dotnet-test.log
            dotnet-verification.log
            dotnet-publish.log
            dotnet-publish-self-contained.log
          if-no-files-found: warn
          retention-days: 7

      - name: 上传 Windows 构建检查包
        uses: actions/upload-artifact@v7
        with:
          name: gamesave-windows-win-x64
          path: publish
          if-no-files-found: error
          retention-days: 14
